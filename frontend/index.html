<!doctype html>
<!-- SPDX-License-Identifier: BSD-3-Clause -->
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AutoDRIVE Race Control Tower</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9Oer+RkR4jXQnAo34au+zY2k0q6F4lF8yK4nE8N2pD6pN"
      crossorigin="anonymous"
    >
  </head>
  <body class="bg-body-tertiary">
    <nav class="navbar navbar-expand navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">AutoDRIVE RCT</a>
        <div class="navbar-nav">
          <a class="nav-link active" aria-current="page" href="#">Dashboard</a>
          <a class="nav-link" href="#connection">Connection</a>
        </div>
      </div>
    </nav>

    <main id="connection" class="container py-5">
      <h1 class="h3 mb-3">AutoDRIVE Race Control Tower</h1>
      <p class="text-secondary mb-4">
        Check the browser console for the RCT WebSocket connection state.
      </p>
      <div class="row g-3">
        <div class="col-12 col-lg-6">
          <label for="serverUrl" class="form-label">WebSocket URL</label>
          <input id="serverUrl" class="form-control">
        </div>
        <div class="col-12 col-lg-6 d-flex align-items-end">
          <button id="connectButton" class="btn btn-primary me-2" type="button">Connect</button>
          <button id="disconnectButton" class="btn btn-outline-secondary" type="button">Disconnect</button>
        </div>
      </div>
    </main>

    <script>
      let socket = null;
      const serverUrlInput = document.getElementById("serverUrl");

      function defaultServerUrl() {
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const host = window.location.host || "localhost:4567";
        return `${protocol}//${host}/frontend`;
      }

      function connect() {
        const serverUrl = serverUrlInput.value;
        if (socket && socket.readyState === WebSocket.OPEN) {
          console.log("RCT WebSocket already connected:", serverUrl);
          return;
        }

        socket = new WebSocket(serverUrl);
        socket.addEventListener("open", () => {
          console.log("RCT WebSocket connected:", serverUrl);
        });
        socket.addEventListener("close", (event) => {
          console.log("RCT WebSocket disconnected:", event.code, event.reason);
        });
        socket.addEventListener("error", (event) => {
          console.log("RCT WebSocket error:", event);
        });
      }

      function disconnect() {
        if (socket) {
          socket.close(1000, "frontend disconnect");
          socket = null;
        }
      }

      serverUrlInput.value = defaultServerUrl();
      document.getElementById("connectButton").addEventListener("click", connect);
      document.getElementById("disconnectButton").addEventListener("click", disconnect);
      connect();
    </script>
  </body>
</html>
